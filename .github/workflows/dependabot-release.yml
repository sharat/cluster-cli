name: Dependabot Release Pipeline

on:
  schedule:
    # Runs every Friday at 04:30 UTC (10:00 AM IST)
    # 1 hour after Dependabot's Friday 09:00 IST run
    - cron: '30 4 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual merges or publishes)'
        required: false
        default: false
        type: boolean

concurrency:
  group: dependabot-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}

jobs:
  review-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
    outputs:
      merged: ${{ steps.merge.outputs.merged }}
      count: ${{ steps.merge.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Find and merge Dependabot PRs
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "🔍 Checking for open Dependabot PRs..."

          # Only merge PRs GitHub reports as cleanly mergeable. BLOCKED often means
          # branch protection, missing reviews, or unresolved requirements.
          mapfile -t prs < <(
            gh pr list \
              --author "dependabot[bot]" \
              --state open \
              --json number,title,mergeStateStatus,url \
              --jq '.[] | select(.mergeStateStatus == "CLEAN") | @base64'
          )

          if [ ${#prs[@]} -eq 0 ]; then
            echo "✅ No clean, open Dependabot PRs found."
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "📋 Found ${#prs[@]} clean Dependabot PR(s) to review"

          merged_count=0

          for encoded_pr in "${prs[@]}"; do
            pr=$(printf '%s' "$encoded_pr" | base64 --decode)
            pr_number=$(echo "$pr" | jq -r '.number')
            pr_title=$(echo "$pr" | jq -r '.title')

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔎 Reviewing PR #$pr_number: $pr_title"

            echo "   Checking CI status..."
            checks=$(gh pr checks "$pr_number" --json name,state --jq '.[]')
            failed_checks=$(echo "$checks" | jq -r 'select(.state != "SUCCESS" and .state != "SKIPPED") | .name')

            if [ -n "$failed_checks" ]; then
              echo "   ⚠️  CI checks not passing, skipping PR #$pr_number"
              echo "   Failed/pending: $failed_checks"
              continue
            fi

            echo "   ✅ CI passing"

            # Conservative major-bump guard for normal Dependabot titles.
            # Grouped PRs that do not expose from/to versions are allowed only
            # after CI passes; review release notes manually if this becomes noisy.
            if echo "$pr_title" | grep -qi "bump.*from.*to"; then
              old_version=$(echo "$pr_title" | grep -oP 'from \K[^\s]+' || echo "")
              new_version=$(echo "$pr_title" | grep -oP 'to \K[^\s]+' || echo "")

              if [ -n "$old_version" ] && [ -n "$new_version" ]; then
                old_major=$(echo "$old_version" | cut -d. -f1 | sed 's/[^0-9]//g')
                new_major=$(echo "$new_version" | cut -d. -f1 | sed 's/[^0-9]//g')

                if [ -n "$old_major" ] && [ -n "$new_major" ] && [ "$new_major" -gt "$old_major" ] 2>/dev/null; then
                  echo "   ⚠️  Major version bump detected ($old_version → $new_version), skipping"
                  continue
                fi
              fi
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "   🧪 [DRY RUN] Would merge PR #$pr_number"
              merged_count=$((merged_count + 1))
            else
              echo "   🔄 Merging PR #$pr_number..."
              if gh pr merge "$pr_number" --squash --delete-branch; then
                echo "   ✅ Merged PR #$pr_number"
                merged_count=$((merged_count + 1))
              else
                echo "   ❌ Failed to merge PR #$pr_number"
              fi
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Merged $merged_count PR(s)!"

          if [ "$merged_count" -gt 0 ]; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi
          echo "count=$merged_count" >> "$GITHUB_OUTPUT"

  release:
    needs: review-and-merge
    if: needs.review-and-merge.outputs.merged == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Wait for main branch CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$DRY_RUN" = "true" ]; then
            echo "🧪 [DRY RUN] Skipping main branch CI wait"
            exit 0
          fi

          target_sha=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          echo "⏳ Waiting for main branch CI at $target_sha to complete..."

          for i in {1..90}; do
            run=$(gh run list --workflow CI --branch main --event push --limit 10 --json headSha,status,conclusion,url --jq ".[] | select(.headSha == \"$target_sha\")" | head -n 1)

            if [ -n "$run" ]; then
              status=$(echo "$run" | jq -r '.status')
              conclusion=$(echo "$run" | jq -r '.conclusion')
              url=$(echo "$run" | jq -r '.url')

              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "✅ Main branch CI passed: $url"
                  break
                else
                  echo "❌ Main branch CI failed ($conclusion): $url"
                  exit 1
                fi
              fi
            fi

            if [ "$i" -eq 90 ]; then
              echo "❌ Timed out waiting for CI on $target_sha"
              exit 1
            fi

            echo "   Waiting... ($i/90)"
            sleep 10
          done

          git fetch origin main
          git reset --hard "$target_sha"

      - name: Bump version
        id: bump
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          NEW_TAG="v$NEW_VERSION"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "❌ Tag $NEW_TAG already exists"
            exit 1
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

      - name: Update Cargo.toml and Cargo.lock
        run: |
          set -euo pipefail

          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i.bak "s/^version = \".*\"/version = \"$NEW_VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

          # Keep the package version in Cargo.lock in sync with Cargo.toml.
          cargo update -w

          git diff -- Cargo.toml Cargo.lock

      - name: Verify package builds
        run: cargo check --locked

      - name: Commit version bump
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail

          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): bump version to $NEW_VERSION"
          git push origin main

      - name: Push release tag
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail

          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "🏷️  Pushed $NEW_TAG. The Release workflow will build binaries and create the GitHub Release."
